<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/admin.css">
<style>
    body{
    background:#f4f7fc;
}

.sidebar{
    width:260px;
    min-height:100vh;
    background:#111827;
}

.sidebar .nav-link{
    color:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
}

.sidebar .nav-link:hover{
    background:#2563eb;
}

.content{
    flex:1;
    padding:25px;
}

.event-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.event-card img{
    height:220px;
    object-fit:cover;
}
</style>
</head>
<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3 d-none d-md-block">

        <h3 class="text-white mb-4">🎟 EventX</h3>

        <ul class="nav flex-column">

            <li><a class="nav-link" href="index.html">📊 Dashboard</a></li>
            <li><a class="nav-link" href="events.html">🎉 Events</a></li>
            <li><a class="nav-link" href="add-event.html">➕ Add Event</a></li>
            <li><a class="nav-link" href="orders.html">🎫 Orders</a></li>
            <li><a class="nav-link" href="verify.html">✔ Verify Tickets</a></li>
            <li><a class="nav-link bg-primary" href="settings.html">⚙ Settings</a></li>

        </ul>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <h2 class="mb-4">⚙ Admin Settings</h2>

        <!-- PROFILE CARD -->
        <div class="card shadow-sm mb-4">

            <div class="card-body">

                <h5>👤 Admin Profile</h5>

                <p class="mb-1">
                    Email: <span id="adminEmail">Loading...</span>
                </p>

                <button id="logoutBtn" class="btn btn-danger mt-3">
                    Logout
                </button>

            </div>

        </div>

        <!-- CHANGE PASSWORD -->
        <div class="card shadow-sm mb-4">

            <div class="card-body">

                <h5>🔐 Change Password</h5>

                <form id="passwordForm">

                    <input
                        type="password"
                        id="newPassword"
                        class="form-control mb-3"
                        placeholder="New Password"
                        required>

                    <button class="btn btn-primary w-100">
                        Update Password
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script type="module" src="settings.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/admin.css">
<style>
    body{
    background:#f4f7fc;
}

.sidebar{
    width:260px;
    min-height:100vh;
    background:#111827;
}

.sidebar .nav-link{
    color:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
}

.sidebar .nav-link:hover{
    background:#2563eb;
}

.content{
    flex:1;
    padding:25px;
}

.event-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.event-card img{
    height:220px;
    object-fit:cover;
}
</style>
</head>
<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3 d-none d-md-block">

        <h3 class="text-white mb-4">🎟 EventX</h3>

        <ul class="nav flex-column">

            <li><a class="nav-link" href="index.html">📊 Dashboard</a></li>
            <li><a class="nav-link" href="events.html">🎉 Events</a></li>
            <li><a class="nav-link" href="add-event.html">➕ Add Event</a></li>
            <li><a class="nav-link" href="orders.html">🎫 Orders</a></li>
            <li><a class="nav-link" href="verify.html">✔ Verify</a></li>
            <li><a class="nav-link" href="settings.html">⚙ Settings</a></li>
            <li>
    <a class="nav-link text-danger" id="logoutBtn">
        🚪 Logout
    </a>
</li>
        </ul>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <h2 class="mb-4">✏ Edit Event</h2>

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <form id="editEventForm">

                    <input type="hidden" id="eventId">

                    <div class="mb-3">
                        <label>Event Name</label>
                        <input type="text" id="eventName" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Price</label>
                        <input type="number" id="eventPrice" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Tickets</label>
                        <input type="number" id="eventTickets" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Date</label>
                        <input type="date" id="eventDate" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Venue</label>
                        <input type="text" id="eventVenue" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Image URL</label>
                        <input type="text" id="eventImage" class="form-control">
                    </div>
                    
                        <select id="eventCategory" class="form-select">
                            <option>Party</option>
                            <option>Music</option>
                            <option>Business</option>
                            <option>Education</option>
                            <option>Sports</option>
                        </select>

                        <textarea id="eventDescription"
                        class="form-control"></textarea>

                        <div class="form-check">
                            <input type="checkbox"
                            id="featured"
                            class="form-check-input">

                            <label class="form-check-label">
                                Featured Event
                            </label>
                        </div>
                    <button class="btn btn-primary w-100">
                        Update Event
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script type="module" src="edit-event.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/admin.css">
<style>
    body{
    background:#f4f7fc;
}

.sidebar{
    width:260px;
    min-height:100vh;
    background:#111827;
}

.sidebar .nav-link{
    color:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
}

.sidebar .nav-link:hover{
    background:#2563eb;
}

.content{
    flex:1;
    padding:25px;
}

.event-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.event-card img{
    height:220px;
    object-fit:cover;
}
</style>
</head>
<body>

<div class="d-flex">

    <!-- DESKTOP SIDEBAR -->
    <div class="sidebar p-3 d-none d-md-block">

        <h3 class="text-white mb-4">
            🎟 EventX
        </h3>

        <ul class="nav flex-column">

            <li>
                <a class="nav-link" href="index.html">
                    📊 Dashboard
                </a>
            </li>

            <li>
                <a class="nav-link" href="events.html">
                    🎉 Events
                </a>
            </li>

            <li>
                <a class="nav-link bg-primary" href="add-event.html">
                    ➕ Add Event
                </a>
            </li>

            <li>
                <a class="nav-link" href="orders.html">
                    🎫 Orders
                </a>
            </li>

            <li>
                <a class="nav-link" href="verify.html">
                    ✔ Verify Tickets
                </a>
            </li>

            <li>
                <a class="nav-link" href="settings.html">
                    ⚙ Settings
                </a>
            </li>
            <li>
    <a class="nav-link text-danger" id="logoutBtn">
        🚪 Logout
    </a>
</li>
        </ul>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <button
            class="btn btn-primary d-md-none mb-3"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar">

            ☰ Menu

        </button>

        <h2 class="mb-4">
            ➕ Add New Event
        </h2>

        <div class="card border-0 shadow-sm">

            <div class="card-body">

                <form id="eventForm">

                    <div class="mb-3">
                        <label class="form-label">
                            Event Name
                        </label>

                        <input
                            type="text"
                            id="eventName"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Ticket Price (₦)
                        </label>

                        <input
                            type="number"
                            id="eventPrice"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Available Tickets
                        </label>

                        <input
                            type="number"
                            id="eventTickets"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Event Date
                        </label>

                        <input
                            type="date"
                            id="eventDate"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Event Venue
                        </label>

                        <input
                            type="text"
                            id="eventVenue"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Event Image URL
                        </label>

                        <input
                            type="text"
                            id="eventImage"
                            class="form-control"
                            required>
                    </div>
                    

                    <select id="eventCategory" class="form-select">
                        <option>Party</option>
                        <option>Music</option>
                        <option>Business</option>
                        <option>Education</option>
                        <option>Sports</option>
                    </select>

                    <textarea id="eventDescription"
                    class="form-control"></textarea>

                    <div class="form-check">
                        <input type="checkbox"
                        id="featured"
                        class="form-check-input">

                        <label class="form-check-label">
                            Featured Event
                        </label>
                    </div>
                    <button
                        class="btn btn-primary w-100"
                        type="submit">

                        Save Event

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- MOBILE SIDEBAR -->

<div
class="offcanvas offcanvas-start"
tabindex="-1"
id="mobileSidebar">

    <div class="offcanvas-header">

        <h5>🎟 EventX</h5>

        <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas">
        </button>

    </div>

    <div class="offcanvas-body">

        <a class="d-block mb-3 text-decoration-none" href="index.html">
            📊 Dashboard
        </a>

        <a class="d-block mb-3 text-decoration-none" href="events.html">
            🎉 Events
        </a>

        <a class="d-block mb-3 text-decoration-none fw-bold" href="add-event.html">
            ➕ Add Event
        </a>

        <a class="d-block mb-3 text-decoration-none" href="orders.html">
            🎫 Orders
        </a>

        <a class="d-block mb-3 text-decoration-none" href="verify.html">
            ✔ Verify Tickets
        </a>

        <a class="d-block mb-3 text-decoration-none" href="settings.html">
            ⚙ Settings
        </a>

    <a class="nav-link text-danger" id="logoutBtn">
        🚪 Logout
    </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="add-event.js"></script>

</body>
</html>

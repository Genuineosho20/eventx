<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/admin.css">
<style>
    body{
    background:#f4f7fc;
}

.sidebar{
    width:260px;
    min-height:100vh;
    background:#111827;
}

.sidebar .nav-link{
    color:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
}

.sidebar .nav-link:hover{
    background:#2563eb;
}

.content{
    flex:1;
    padding:25px;
}

.event-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.event-card img{
    height:220px;
    object-fit:cover;
}
</style>
</head>
<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3 d-none d-md-block">

        <h3 class="text-white mb-4">🎟 EventX</h3>

        <ul class="nav flex-column">

            <li><a class="nav-link" href="index.html">📊 Dashboard</a></li>
            <li><a class="nav-link" href="events.html">🎉 Events</a></li>
            <li><a class="nav-link" href="add-event.html">➕ Add Event</a></li>
            <li><a class="nav-link bg-primary" href="orders.html">🎫 Orders</a></li>
            <li><a class="nav-link" href="verify.html">✔ Verify Tickets</a></li>
            <li><a class="nav-link" href="settings.html">⚙ Settings</a></li>
            <li>
    <a class="nav-link text-danger" id="logoutBtn">
        🚪 Logout
    </a>
</li>
        </ul>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- MOBILE MENU -->
        <button
            class="btn btn-primary d-md-none mb-3"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar">

            ☰ Menu

        </button>

        <h2 class="mb-3">🎫 Orders</h2>

        <!-- SEARCH -->
        <div class="row mb-3">

            <div class="col-md-6">

                <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Search by email or ticket ID">

            </div>

        </div>
        <div class="d-flex justify-content-between mb-3">
    <button id="exportPDF" class="btn btn-success">
        📄 Export PDF
    </button>

</div>
        <!-- ORDERS LIST -->
        <div id="ordersContainer">

            <div class="text-muted">
                Loading orders...
            </div>

        </div>

    </div>

</div>

<!-- MOBILE SIDEBAR -->
<div class="offcanvas offcanvas-start" id="mobileSidebar">

    <div class="offcanvas-header">
        <h5>🎟 EventX</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

        <a class="d-block mb-3" href="index.html">📊 Dashboard</a>
        <a class="d-block mb-3" href="events.html">🎉 Events</a>
        <a class="d-block mb-3" href="add-event.html">➕ Add Event</a>
        <a class="d-block mb-3 fw-bold" href="orders.html">🎫 Orders</a>
        <a class="d-block mb-3" href="verify.html">✔ Verify</a>
        <a class="d-block mb-3" href="settings.html">⚙ Settings</a>
    <a class="nav-link text-danger" id="logoutBtn">
        🚪 Logout
    </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script type="module" src="orders.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:100%;
    max-width:400px;
    border-radius:15px;
}
</style>

</head>
<body>

<div class="card p-4 shadow">

    <h3 class="text-center mb-3">🎟 Admin Login</h3>

    <form id="loginForm">

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                id="email"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input
                type="password"
                id="password"
                class="form-control"
                required>

        </div>

        <button class="btn btn-primary w-100">
            Login
        </button>

    </form>

</div>

<script type="module" src="login.js"></script>

</body>
</html>

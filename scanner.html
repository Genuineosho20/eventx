<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
    text-align:center;
}

#reader{
    width:100%;
    max-width:400px;
    margin:auto;
}

.result-box{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
    padding:20px;
}

.valid{ background:green; }
.invalid{ background:red; }
.used{ background:orange; }
</style>

</head>

<body>

<h2>📷 Scan Ticket</h2>

<div id="reader"></div>

<div id="result"></div>

<script type="module" src="scanner.js"></script>

</body>
</html>
